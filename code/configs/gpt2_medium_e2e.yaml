model:
  name: gpt2-medium
  type: gpt2

task:
  name: e2e_nlg
  max_length: 512

lora:
  rank: 4
  alpha: 32
  dropout: 0.1

training:
  batch_size: 8
  num_epochs: 5
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 500     # paper Table 11
  label_smoothing: 0.1  # paper Table 11
  grad_clip: 1.0
  seed: 42
  log_steps: 100

output:
  dir: ./runs/gpt2_medium_e2e
